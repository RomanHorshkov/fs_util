name: fsutil integration pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    name: build, test, archive
    runs-on: ubuntu-latest

    env:
      FSUTIL_RESULTS_RUN_ID: gha-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes libcmocka-dev gcovr pkg-config file

      - name: Ensure utility scripts are executable
        run: chmod +x utils/*.sh

      - name: Prepare result archive directory
        run: mkdir -p "tests/results/ITs/runs/${FSUTIL_RESULTS_RUN_ID}"

      - name: Build libraries
        shell: bash
        run: |
          set -euo pipefail
          ./utils/build_libs.sh 2>&1 | tee "tests/results/ITs/runs/${FSUTIL_RESULTS_RUN_ID}/build_libs.log"

      - name: Build integration tests
        shell: bash
        run: |
          set -euo pipefail
          ./utils/build_ITs.sh 2>&1 | tee "tests/results/ITs/runs/${FSUTIL_RESULTS_RUN_ID}/build_ITs.log"

      - name: Run integration tests
        run: ./utils/run_ITs.sh

      - name: Publish job summary
        if: always()
        shell: bash
        run: |
          {
            echo '## fsutil integration pipeline'
            echo
            echo "- Run id: \`${FSUTIL_RESULTS_RUN_ID}\`"
            echo '- Archived HTML entrypoint: `tests/results/ITs/index.html`'
            echo '- Archived latest run entrypoint: `tests/results/ITs/latest/index.html`'
            echo
            echo '### Text summary'
            echo
            echo '```text'
            if [[ -f tests/results/ITs/integration_result.txt ]]; then
              sed -n '1,200p' tests/results/ITs/integration_result.txt
            else
              echo 'integration_result.txt was not generated'
            fi
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload integration results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fsutil-integration-results
          path: tests/results/ITs
          if-no-files-found: error

  pages:
    name: publish results to GitHub Pages
    if: >
      vars.ENABLE_RESULTS_PAGES == '1' &&
      github.event_name == 'push' &&
      github.ref_name == github.event.repository.default_branch
    needs: integration
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download integration results artifact
        uses: actions/download-artifact@v4
        with:
          name: fsutil-integration-results
          path: site

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v4
