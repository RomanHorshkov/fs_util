name: fsutil integration pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FSUTIL_RESULTS_RUN_ID: gha-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes file gcovr

      - name: Ensure utility scripts are executable
        run: chmod +x utils/*.sh

      - name: Build libraries
        run: ./utils/run_pipeline.sh build

      - name: Upload build context
        uses: actions/upload-artifact@v4
        with:
          name: fsutil-build-context-${{ env.FSUTIL_RESULTS_RUN_ID }}
          path: |
            build
            tests/results/ITs/runs/${{ env.FSUTIL_RESULTS_RUN_ID }}
          retention-days: 1
          if-no-files-found: error

  build_its:
    name: build_ITs
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install integration-build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes file libcmocka-dev pkg-config

      - name: Ensure utility scripts are executable
        run: chmod +x utils/*.sh

      - name: Download build context
        uses: actions/download-artifact@v4
        with:
          name: fsutil-build-context-${{ env.FSUTIL_RESULTS_RUN_ID }}
          path: .

      - name: Build integration tests
        run: ./utils/run_pipeline.sh build_ITs

      - name: Upload test context
        uses: actions/upload-artifact@v4
        with:
          name: fsutil-test-context-${{ env.FSUTIL_RESULTS_RUN_ID }}
          path: |
            build
            tests/results/ITs/runs/${{ env.FSUTIL_RESULTS_RUN_ID }}
          retention-days: 1
          if-no-files-found: error

  run_its:
    name: run_ITs
    needs: build_its
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install integration-run dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes file gcovr libcmocka-dev pkg-config

      - name: Ensure utility scripts are executable
        run: chmod +x utils/*.sh

      - name: Download test context
        uses: actions/download-artifact@v4
        with:
          name: fsutil-test-context-${{ env.FSUTIL_RESULTS_RUN_ID }}
          path: .

      - name: Run integration tests
        run: ./utils/run_pipeline.sh run_ITs

      - name: Publish job summary
        if: always()
        shell: bash
        run: |
          {
            echo '## fsutil integration pipeline'
            echo
            echo "- Run id: \`${FSUTIL_RESULTS_RUN_ID}\`"
            echo '- Job graph: `build -> build_ITs -> run_ITs`'
            echo '- HTML results are generated in the workspace and uploaded below as a short-lived artifact.'
            echo '- GitHub Actions job summaries support Markdown, not arbitrary HTML rendering.'
            echo
            echo '### Result paths'
            echo
            echo '- Overview: `tests/results/ITs/index.html`'
            echo '- Latest run summary: `tests/results/ITs/integration_result.txt`'
            echo "- Archived run root: \`tests/results/ITs/runs/${FSUTIL_RESULTS_RUN_ID}\`"
            echo
            echo '### Text summary'
            echo
            echo '```text'
            if [[ -f tests/results/ITs/integration_result.txt ]]; then
              sed -n '1,200p' tests/results/ITs/integration_result.txt
            else
              echo 'integration_result.txt was not generated'
            fi
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload integration results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fsutil-integration-results-${{ env.FSUTIL_RESULTS_RUN_ID }}
          path: tests/results/ITs
          retention-days: 1
          if-no-files-found: error
